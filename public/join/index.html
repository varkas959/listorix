<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open Listorix</title>
    <meta name="theme-color" content="#1AABA8" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f7fafc;
        --card: #ffffff;
        --text: #132238;
        --muted: #617287;
        --primary: #1aaba8;
        --border: #dbe5ee;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, rgba(26, 171, 168, 0.14), transparent 32%), var(--bg);
        color: var(--text);
      }

      .card {
        width: min(100%, 420px);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 28px 22px;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
        text-align: center;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 60px;
        height: 60px;
        border-radius: 18px;
        background: linear-gradient(180deg, #23b7c2 0%, #138da0 100%);
        color: #fff;
        font-size: 30px;
        font-weight: 800;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.55;
      }

      .actions {
        margin-top: 22px;
        display: grid;
        gap: 12px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 50px;
        width: 100%;
        border-radius: 16px;
        border: 1px solid transparent;
        text-decoration: none;
        font-weight: 700;
        font-size: 16px;
      }

      .btn-primary {
        background: var(--primary);
        color: #fff;
      }

      .btn-secondary {
        background: #fff;
        color: var(--text);
        border-color: var(--border);
      }

      .hint {
        margin-top: 16px;
        font-size: 13px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">?</div>
      <h1>Open in Listorix</h1>
      <p id="message">Preparing your family invite...</p>
      <div class="actions">
        <a id="openAppButton" class="btn btn-primary" href="/">Open Listorix</a>
        <a id="storeButton" class="btn btn-secondary" href="https://apps.apple.com/app/id6761041457">Get Listorix</a>
      </div>
      <p class="hint">If Listorix is installed, this invite opens in the app. Otherwise, install it and open the invite again.</p>
    </main>
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const code = (params.get("code") || "").trim().toUpperCase();
        const message = document.getElementById("message");
        const openAppButton = document.getElementById("openAppButton");
        const storeButton = document.getElementById("storeButton");
        const ua = navigator.userAgent || "";
        const isAndroid = /Android/i.test(ua);
        const isIOS = /iPhone|iPad|iPod/i.test(ua);
        const storeUrl = isAndroid
          ? "https://play.google.com/store/apps/details?id=com.listorix.app"
          : "https://apps.apple.com/app/id6761041457";
        let appOpened = false;

        storeButton.href = storeUrl;
        storeButton.textContent = isAndroid ? "Get Listorix on Google Play" : "Get Listorix on the App Store";

        if (!code || code.length !== 8) {
          message.textContent = "This invite link is missing a valid household invite.";
          openAppButton.textContent = "Open Listorix";
          openAppButton.href = "listorix://";
          return;
        }

        const appUrl = "listorix://join?code=" + encodeURIComponent(code);
        message.textContent = "Your family invite is ready. We'll open Listorix if it's installed.";
        openAppButton.href = appUrl;

        document.addEventListener("visibilitychange", function () {
          if (document.visibilityState === "hidden") {
            appOpened = true;
          }
        });

        window.setTimeout(function () {
          window.location.href = appUrl;
        }, 120);

        if (isIOS || isAndroid) {
          window.setTimeout(function () {
            if (!appOpened) {
              window.location.href = storeUrl;
            }
          }, 1600);
        }
      })();
    </script>
  </body>
</html>
